<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로또 번호 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #f1f1f5;
    --muted: #8a8a99;
    --accent: #d4af37;
    --accent-2: #f4d06f;
    --danger: #ff6b6b;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background:
      radial-gradient(circle at 20% 0%, rgba(212,175,55,0.08), transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(100,80,200,0.08), transparent 40%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 560px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: -0.5px;
  }
  header p { color: var(--muted); margin-top: 6px; font-size: 13px; }

  .tabs {
    display: flex; gap: 4px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px; margin-bottom: 20px;
  }
  .tab {
    flex: 1; padding: 10px; background: transparent; border: none;
    color: var(--muted); cursor: pointer; border-radius: 9px;
    font-size: 13px; font-weight: 600; font-family: inherit;
  }
  .tab.active { background: rgba(212,175,55,0.15); color: var(--accent-2); }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  .card-title {
    font-size: 12px; color: var(--muted); margin-bottom: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .row { display: flex; gap: 8px; }
  input[type="password"], input[type="text"] {
    flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 10px;
    font-size: 13px; outline: none; font-family: monospace;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    background: rgba(212,175,55,0.15); color: var(--accent-2);
    border: 1px solid rgba(212,175,55,0.3); padding: 10px 14px;
    border-radius: 10px; cursor: pointer; font-size: 13px;
    font-weight: 600; font-family: inherit;
  }
  .btn:hover { background: rgba(212,175,55,0.25); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 6px 10px; font-size: 11px; }
  .btn-danger { background: rgba(255,107,107,0.1); color: var(--danger); border-color: rgba(255,107,107,0.3); }
  .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }

  .status { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  .generate-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent), #b8941f);
    border: none; border-radius: 14px; color: #1a1a1a;
    font-size: 16px; font-weight: 700; cursor: pointer;
    margin-bottom: 20px; box-shadow: 0 8px 24px rgba(212,175,55,0.25);
    transition: transform 0.15s; letter-spacing: -0.3px; font-family: inherit;
  }
  .generate-btn:hover { transform: translateY(-2px); }
  .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .sets { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .set {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px; backdrop-filter: blur(10px);
  }
  .set-row { display: flex; align-items: center; gap: 10px; }
  .set-label { font-size: 12px; color: var(--muted); width: 24px; font-weight: 700; }
  .balls { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .ball {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: #fff;
    box-shadow: inset -2px -3px 6px rgba(0,0,0,0.25), 0 3px 8px rgba(0,0,0,0.35);
    opacity: 0; transform: scale(0.3) translateY(-20px);
    animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes pop { to { opacity: 1; transform: scale(1) translateY(0); } }
  .ball.y { background: linear-gradient(135deg, #fbc02d, #f57f17); }
  .ball.b { background: linear-gradient(135deg, #42a5f5, #1565c0); }
  .ball.r { background: linear-gradient(135deg, #ef5350, #c62828); }
  .ball.gr { background: linear-gradient(135deg, #757575, #424242); }
  .ball.g { background: linear-gradient(135deg, #66bb6a, #2e7d32); }

  .set-actions {
    display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border); align-items: center; flex-wrap: wrap;
  }
  .match-info { font-size: 11px; flex: 1; color: var(--muted); line-height: 1.4; min-width: 100%; }
  .match-info.warn { color: #ffb74d; }
  .match-info.ok { color: #81c784; }

  .comment-box {
    background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(212,175,55,0.03));
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 14px; padding: 16px; text-align: center;
    font-size: 15px; color: var(--accent-2); min-height: 56px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1.5; margin-bottom: 16px;
  }
  .comment-box.hidden { display: none; }
  .comment-box.error { color: #ff8a80; border-color: rgba(255,138,128,0.3); background: rgba(255,138,128,0.05); }
  .loading-dots::after { content: '...'; display: inline-block; animation: dots 1.2s infinite; }
  @keyframes dots {
    0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; }
  }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #1a1a24; border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; max-width: 360px;
    width: 100%; text-align: center;
  }
  .modal h3 { margin-bottom: 12px; font-size: 16px; }
  .qr-img { width: 220px; height: 220px; background: #fff; padding: 10px; border-radius: 12px; margin: 12px auto; }
  .qr-nums { font-size: 13px; color: var(--muted); margin-bottom: 12px; font-family: monospace; letter-spacing: 1px; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

  .progress { height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width 0.3s; }

  @media (max-width: 380px) {
    .ball { width: 32px; height: 32px; font-size: 12px; }
    .balls { gap: 5px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>✦ 행운의 로또 ✦</h1>
      <p>1~45 중 6개 · 5세트 자동 생성</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="generate">🎲 생성</button>
      <button class="tab" data-tab="favorites">⭐ 즐겨찾기</button>
      <button class="tab" data-tab="settings">⚙ 설정</button>
    </div>

    <div class="tab-content" id="tab-generate">
      <button class="generate-btn" id="generateBtn">🎲 번호 생성하기</button>
      <div class="sets" id="sets"></div>
      <div class="comment-box hidden" id="commentBox"></div>
    </div>

    <div class="tab-content" id="tab-favorites" style="display:none">
      <div id="favoritesList"></div>
    </div>

    <div class="tab-content" id="tab-settings" style="display:none">
      <div class="card">
        <div class="card-title">Claude API 키</div>
        <div class="row">
          <input type="password" id="apiKey" placeholder="sk-ant-..." />
          <button class="btn" id="saveKeyBtn">저장</button>
        </div>
        <div class="status" id="apiStatus">API 키 입력 시 행운 코멘트가 생성됩니다.</div>
      </div>

      <div class="card">
        <div class="card-title">역대 당첨번호 데이터</div>
        <div class="status" id="dbStatus">동기화 전입니다.</div>
        <div class="progress" id="progressWrap" style="display:none">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="row" style="margin-top:10px">
          <button class="btn" id="syncBtn">동기화</button>
          <button class="btn btn-ghost" id="clearDbBtn">초기화</button>
        </div>
        <div class="status">
          동행복권에서 1회차부터 최신 회차까지 가져와 저장합니다.<br>
          ※ 브라우저 CORS 정책으로 차단될 수 있으며, 차단 시 비교 기능은 사용 불가합니다.
        </div>
      </div>

      <div class="card">
        <div class="card-title">즐겨찾기 관리</div>
        <button class="btn btn-danger btn-sm" id="clearFavBtn">전체 삭제</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="qrModal">
    <div class="modal">
      <h3>QR 코드</h3>
      <div class="qr-nums" id="qrNums"></div>
      <img class="qr-img" id="qrImg" alt="QR" />
      <div class="status" style="margin-bottom:12px">※ 매장 구매용이 아닌, 번호 저장/공유용입니다.</div>
      <button class="btn" id="qrCloseBtn">닫기</button>
    </div>
  </div>

<script>
const API_KEY = 'claude_api_key';
const FAV_KEY = 'lotto_favorites';
const DB_KEY = 'lotto_winning_db';
const DB_META_KEY = 'lotto_winning_meta';
const $ = id => document.getElementById(id);

// 탭
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    $('tab-' + t.dataset.tab).style.display = 'block';
    if (t.dataset.tab === 'favorites') renderFavorites();
    if (t.dataset.tab === 'settings') refreshDbStatus();
  });
});

// API 키
const savedKey = localStorage.getItem(API_KEY);
if (savedKey) { $('apiKey').value = savedKey; $('apiStatus').textContent = '✓ API 키 저장됨'; }
$('saveKeyBtn').addEventListener('click', () => {
  const k = $('apiKey').value.trim();
  if (!k) { localStorage.removeItem(API_KEY); $('apiStatus').textContent = 'API 키 삭제됨'; return; }
  localStorage.setItem(API_KEY, k); $('apiStatus').textContent = '✓ API 키 저장됨';
});

// 번호 생성
function getBallClass(n) {
  if (n <= 10) return 'y';
  if (n <= 20) return 'b';
  if (n <= 30) return 'r';
  if (n <= 40) return 'gr';
  return 'g';
}
function generateSet() {
  const nums = new Set();
  while (nums.size < 6) nums.add(Math.floor(Math.random() * 45) + 1);
  return [...nums].sort((a,b) => a-b);
}

function renderSets(sets) {
  const setsEl = $('sets');
  setsEl.innerHTML = '';
  sets.forEach((set, setIdx) => {
    const setDiv = document.createElement('div');
    setDiv.className = 'set';
    const row = document.createElement('div');
    row.className = 'set-row';
    const label = document.createElement('div');
    label.className = 'set-label';
    label.textContent = `${setIdx + 1}`;
    const ballsDiv = document.createElement('div');
    ballsDiv.className = 'balls';
    set.forEach((n, i) => {
      const ball = document.createElement('div');
      ball.className = `ball ${getBallClass(n)}`;
      ball.textContent = n;
      ball.style.animationDelay = `${(setIdx * 6 + i) * 0.08}s`;
      ballsDiv.appendChild(ball);
    });
    row.appendChild(label);
    row.appendChild(ballsDiv);
    setDiv.appendChild(row);

    const actions = document.createElement('div');
    actions.className = 'set-actions';
    const matchInfo = document.createElement('div');
    matchInfo.className = 'match-info ' + getMatchClass(set);
    matchInfo.textContent = checkMatch(set);
    actions.appendChild(matchInfo);

    const favBtn = document.createElement('button');
    favBtn.className = 'btn btn-sm';
    favBtn.textContent = '⭐ 저장';
    favBtn.addEventListener('click', () => saveFavorite(set, favBtn));
    actions.appendChild(favBtn);

    const qrBtn = document.createElement('button');
    qrBtn.className = 'btn btn-sm btn-ghost';
    qrBtn.textContent = 'QR';
    qrBtn.addEventListener('click', () => showQR(set));
    actions.appendChild(qrBtn);

    setDiv.appendChild(actions);
    setsEl.appendChild(setDiv);
  });
}

// 당첨번호 비교
function getDb() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch { return {}; }
}
function checkMatch(set) {
  const db = getDb();
  const keys = Object.keys(db);
  if (keys.length === 0) return '역대 비교: 데이터 동기화 필요 (설정 탭)';
  const setKey = set.join(',');
  for (const round of keys) {
    if (db[round] === setKey) return `⚠ ${round}회차 1등 당첨 조합과 동일`;
  }
  return `✓ 역대 ${keys.length}회차 중 동일 조합 없음`;
}
function getMatchClass(set) {
  const db = getDb();
  if (Object.keys(db).length === 0) return '';
  const setKey = set.join(',');
  for (const round of Object.keys(db)) if (db[round] === setKey) return 'warn';
  return 'ok';
}

// 즐겨찾기
function getFavorites() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch { return []; }
}
function saveFavorite(set, btn) {
  const favs = getFavorites();
  const key = set.join(',');
  if (favs.some(f => f.nums.join(',') === key)) {
    btn.textContent = '이미 저장됨';
    setTimeout(() => btn.textContent = '⭐ 저장', 1200);
    return;
  }
  favs.unshift({ nums: set, savedAt: Date.now() });
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  btn.textContent = '✓ 저장됨';
  btn.disabled = true;
}
function renderFavorites() {
  const favs = getFavorites();
  const wrap = $('favoritesList');
  if (favs.length === 0) {
    wrap.innerHTML = '<div class="empty">저장된 번호가 없습니다.<br>생성 탭에서 ⭐ 버튼을 눌러 저장하세요.</div>';
    return;
  }
  wrap.innerHTML = '';
  favs.forEach((f, idx) => {
    const div = document.createElement('div');
    div.className = 'set';
    const row = document.createElement('div');
    row.className = 'set-row';
    const ballsDiv = document.createElement('div');
    ballsDiv.className = 'balls';
    f.nums.forEach(n => {
      const b = document.createElement('div');
      b.className = `ball ${getBallClass(n)}`;
      b.textContent = n;
      b.style.opacity = 1; b.style.transform = 'none'; b.style.animation = 'none';
      ballsDiv.appendChild(b);
    });
    row.appendChild(ballsDiv);
    div.appendChild(row);

    const actions = document.createElement('div');
    actions.className = 'set-actions';
    const info = document.createElement('div');
    info.className = 'match-info ' + getMatchClass(f.nums);
    info.textContent = new Date(f.savedAt).toLocaleString('ko-KR') + ' · ' + checkMatch(f.nums);
    actions.appendChild(info);

    const qrBtn = document.createElement('button');
    qrBtn.className = 'btn btn-sm btn-ghost';
    qrBtn.textContent = 'QR';
    qrBtn.addEventListener('click', () => showQR(f.nums));
    actions.appendChild(qrBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-sm btn-danger';
    delBtn.textContent = '삭제';
    delBtn.addEventListener('click', () => {
      const list = getFavorites();
      list.splice(idx, 1);
      localStorage.setItem(FAV_KEY, JSON.stringify(list));
      renderFavorites();
    });
    actions.appendChild(delBtn);

    div.appendChild(actions);
    wrap.appendChild(div);
  });
}
$('clearFavBtn').addEventListener('click', () => {
  if (!confirm('즐겨찾기를 모두 삭제할까요?')) return;
  localStorage.removeItem(FAV_KEY);
  alert('삭제되었습니다.');
});

// QR
function showQR(set) {
  const text = '로또번호: ' + set.join('-');
  $('qrNums').textContent = set.join(' · ');
  $('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}`;
  $('qrModal').classList.add('show');
}
$('qrCloseBtn').addEventListener('click', () => $('qrModal').classList.remove('show'));
$('qrModal').addEventListener('click', e => {
  if (e.target.id === 'qrModal') $('qrModal').classList.remove('show');
});

// 동행복권 동기화
async function fetchRound(drwNo) {
  const url = `https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${drwNo}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('네트워크 오류');
  return res.json();
}
async function findLatestRound() {
  const start = new Date('2002-12-07').getTime();
  const weeks = Math.floor((Date.now() - start) / (7 * 86400000)) + 1;
  for (let n = weeks + 2; n > weeks - 5; n--) {
    try {
      const data = await fetchRound(n);
      if (data.returnValue === 'success') return n;
    } catch {}
  }
  return weeks;
}
async function syncDb() {
  const btn = $('syncBtn');
  btn.disabled = true;
  $('progressWrap').style.display = 'block';
  $('dbStatus').textContent = '최신 회차 확인 중...';
  try {
    const latest = await findLatestRound();
    $('dbStatus').textContent = `최신 ${latest}회차 확인. 다운로드 시작...`;
    const db = getDb();
    const existing = new Set(Object.keys(db));
    const toFetch = [];
    for (let n = 1; n <= latest; n++) if (!existing.has(String(n))) toFetch.push(n);

    if (toFetch.length === 0) {
      $('dbStatus').textContent = `✓ 이미 최신 (${latest}회차까지 ${Object.keys(db).length}건)`;
      $('progressWrap').style.display = 'none';
      btn.disabled = false;
      return;
    }

    const BATCH = 15;
    let done = 0;
    for (let i = 0; i < toFetch.length; i += BATCH) {
      const batch = toFetch.slice(i, i + BATCH);
      const results = await Promise.all(batch.map(n => fetchRound(n).catch(() => null)));
      results.forEach((data, idx) => {
        if (data && data.returnValue === 'success') {
          const nums = [data.drwtNo1, data.drwtNo2, data.drwtNo3, data.drwtNo4, data.drwtNo5, data.drwtNo6]
            .sort((a,b) => a-b).join(',');
          db[batch[idx]] = nums;
        }
      });
      done += batch.length;
      const pct = Math.min(100, (done / toFetch.length) * 100);
      $('progressBar').style.width = pct + '%';
      $('dbStatus').textContent = `다운로드 중... ${Math.min(done, toFetch.length)} / ${toFetch.length}`;
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }

    localStorage.setItem(DB_META_KEY, JSON.stringify({ latest, syncedAt: Date.now() }));
    $('dbStatus').textContent = `✓ 동기화 완료 (1~${latest}회차, ${Object.keys(db).length}건)`;
    $('progressWrap').style.display = 'none';
  } catch (err) {
    $('dbStatus').textContent = `⚠ 오류: ${err.message}. CORS 차단일 수 있습니다.`;
    $('progressWrap').style.display = 'none';
  }
  btn.disabled = false;
}
$('syncBtn').addEventListener('click', syncDb);
$('clearDbBtn').addEventListener('click', () => {
  if (!confirm('당첨번호 데이터를 초기화할까요?')) return;
  localStorage.removeItem(DB_KEY);
  localStorage.removeItem(DB_META_KEY);
  refreshDbStatus();
});
function refreshDbStatus() {
  const db = getDb();
  const cnt = Object.keys(db).length;
  if (cnt === 0) { $('dbStatus').textContent = '동기화 전입니다.'; return; }
  const meta = JSON.parse(localStorage.getItem(DB_META_KEY) || '{}');
  $('dbStatus').textContent = `저장된 회차: ${cnt}건${meta.latest ? ` (최신 ${meta.latest}회)` : ''}`;
}

// Claude 코멘트
async function fetchComment(sets) {
  const key = localStorage.getItem(API_KEY);
  if (!key) { $('commentBox').classList.add('hidden'); return; }
  $('commentBox').classList.remove('hidden', 'error');
  $('commentBox').innerHTML = '<span class="loading-dots">행운의 메시지를 받는 중</span>';

  const setsText = sets.map((s, i) => `${i+1}세트: ${s.join(', ')}`).join('\n');
  const prompt = `다음은 로또 번호 5세트입니다:\n${setsText}\n\n이 번호들을 보고 짧고 재미있는 한국어 행운 코멘트를 1개만 작성해주세요. 한 문장, 50자 이내, 이모지 1~2개 포함. 코멘트만 출력하세요.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `API 오류 (${res.status})`);
    }
    const data = await res.json();
    $('commentBox').textContent = data.content?.[0]?.text?.trim() || '행운을 빕니다!';
  } catch (err) {
    $('commentBox').classList.add('error');
    $('commentBox').textContent = `⚠ ${err.message}`;
  }
}

$('generateBtn').addEventListener('click', () => {
  $('generateBtn').disabled = true;
  const sets = Array.from({ length: 5 }, () => generateSet());
  renderSets(sets);
  setTimeout(() => {
    fetchComment(sets);
    $('generateBtn').disabled = false;
  }, 5 * 6 * 80 + 500);
});
</script>
</body>
</html>
